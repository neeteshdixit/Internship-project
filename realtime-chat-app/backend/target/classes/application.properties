# 1. APPLICATION NAME
spring.application.name=whatsapp-clone-backend

# 2. DATABASE CONFIGURATION (PostgreSQL connection parameters)
spring.datasource.url=jdbc:postgresql://localhost:5432/chatapp
spring.datasource.username=postgres
spring.datasource.password=Neet2006@
spring.datasource.driver-class-name=org.postgresql.Driver

# 3. HIBERNATE ORM CONFIGURATION
# ddl-auto=update means: Java class entities changes automatic database tables structure mein copy ho jayengi
spring.jpa.hibernate.ddl-auto=update
# Console logs mein run ho rahi SQL queries ko represent karne ke liye
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 4. SERVER CONFIGURATION
server.port=8081

# 5. JWT CONFIGURATION
# jwt.secret: Hashing signature verification key (Base64 Encoded - Minimum 256 bits for HMAC-SHA256)
jwt.secret=9a4f2c8d3b7a1e5f8c6d4e2b0a1c3e5f7a9b8c0d1e2f3a4b5c6d7e8f9a0b1c2d
# jwt.expiration: Token expiry time in milliseconds (86400000 ms = 24 hours)
jwt.expiration=86400000

# 6. OLLAMA LOCAL AI CONFIGURATION
# Ollama local engine base server URL
spring.ai.ollama.base-url=http://localhost:11434
# Default model name setup (Phi-3 is fast and optimized for client-side chat summarization)
spring.ai.ollama.chat.options.model=phi3

